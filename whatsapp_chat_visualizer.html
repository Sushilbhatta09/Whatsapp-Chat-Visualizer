      Sparkles: () => <svg className="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>,
      User: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>,

      AlertCircle: () => <svg className="w-4 h-4 text-red-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>,
      Loader: () => <svg className="w-4 h-4 animate-spin text-emerald-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3m0 0l3 3m-3-3v12"></path></svg>,
      ChevronRight: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"></path></svg>
    };

    const DEMO_CHAT = `[12/10/2023, 09:15:22] Sarah: Hey! Are we still on for the project meeting today?
[12/10/2023, 09:16:05] Alex: Hey Sarah! Yes, absolutely. 10:30 AM at the usual cafe?
[12/10/2023, 09:16:45] Sarah: Perfect. I've finished drafting the initial design layout. Let me send a quick summary.
[12/10/2023, 09:17:12] Sarah: 1. Core dashboard design is ready 🎨
2. User profile flow is mapped out.
3. Dark mode themes are designed! ✨
[12/10/2023, 09:18:00] Alex: That is amazing! The dark mode is going to be a huge hit. Did you consider the custom color palettes we discussed?
[12/10/2023, 09:19:15] Sarah: Yes! I added a slate-neutral palette and an emerald-mint scheme. Looks super clean.
[12/10/2023, 09:20:02] Alex: Awesome 🚀. I will bring the technical architecture draft so we can map the APIs.
[12/10/2023, 09:21:10] Sarah: Great, see you in a bit! Don't forget to grab some coffee. ☕
[12/10/2023, 09:22:00] Alex: Haha, always! On my way now. 🏃‍♂️`;

    const SYSTEM_PATTERNS = [
      /end-to-end encrypted/i,
      /created group/i,
      /added/i,
      /joined using/i,
      /changed the subject/i,
      /left/i,
      /changed their phone number/i,
      /changed this group's icon/i
    ];

    function App() {
      const [chatText, setChatText] = useState(DEMO_CHAT);
      const [parsedMessages, setParsedMessages] = useState([]);
      const [selectedUser, setSelectedUser] = useState(''); // Represents "Me" (Right-aligned)
      const [activeTab, setActiveTab] = useState('chat'); // 'chat' | 'stats' | 'ai'
      const [darkMode, setDarkMode] = useState(true);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchMode, setSearchMode] = useState('filter'); // 'filter' | 'highlight'
      const [filterUser, setFilterUser] = useState('All');
      const [showDemoBanner, setShowDemoBanner] = useState(true);

      // Analytics state
      const [parsedStats, setParsedStats] = useState({
        totalMessages: 0,
        userCounts: {},
        hourlyActivity: Array(24).fill(0),
        topEmojis: [],
        topWords: [],
      });

      // Gemini AI State
      const [aiSummary, setAiSummary] = useState('');
      const [summaryLoading, setSummaryLoading] = useState(false);
      const [summaryError, setSummaryError] = useState('');

      const [simulatorTarget, setSimulatorTarget] = useState('');
      const [simulatorQuestion, setSimulatorQuestion] = useState('');
      const [simulatorAnswer, setSimulatorAnswer] = useState('');
      const [simulatorLoading, setSimulatorLoading] = useState(false);
      const [simulatorError, setSimulatorError] = useState('');

      const [semanticQuery, setSemanticQuery] = useState('');
      const [semanticAnswer, setSemanticAnswer] = useState('');
      const [semanticLoading, setSemanticLoading] = useState(false);
      const [semanticError, setSemanticError] = useState('');

      const fileInputRef = useRef(null);
      const chatEndRef = useRef(null);
      const messageRefs = useRef({});

      // Apply Dark Mode Class to HTML/Body
      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      // Parse whenever text loads
      useEffect(() => {
        parseChat(chatText);
      }, [chatText]);

      // Handle default side assignments upon participants update
      useEffect(() => {
        if (participants.length > 0) {
          // If 2 participants exist, place the 2nd on the right dynamically so they split beautifully
          if (!selectedUser || !participants.includes(selectedUser)) {
            setSelectedUser(participants[1] || participants[0]);
          }
        }
      }, [participants]);

      // Extract participants list
      const participants = useMemo(() => {
        const senders = new Set();
        parsedMessages.forEach(m => {
          if (!m.isSystem && m.sender) senders.add(m.sender);
        });
        const list = Array.from(senders);
        if (list.length > 0 && !simulatorTarget) {
          setSimulatorTarget(list[0]);
        }
        return list;
      }, [parsedMessages]);

      // =========================================================================
      // =========================================================================
      
      const parseChat = (text) => {
        if (!text || text.trim() === '') {
          setParsedMessages([]);
          return;
        }

        const lines = text.split('\n');
        const messages = [];
        let currentMessage = null;

        const iosRegex = /^\[(\d{1,2}[./]\d{1,2}[./]\d{2,4}),\s(\d{1,2}:\d{2}(?::\d{2})?\s?[A-Za-z]{0,2})\]\s([^:]+):\s(.*)$/;
        const androidRegex = /^(\d{1,2}[./]\d{1,2}[./]\d{2,4}),\s(\d{1,2}:\d{2}(?::\d{2})?\s?[A-Za-z]{0,2})\s-\s([^:]+):\s(.*)$/;
        const systemAndroidRegex = /^(\d{1,2}[./]\d{1,2}[./]\d{2,4}),\s(\d{1,2}:\d{2}(?::\d{2})?\s?[A-Za-z]{0,2})\s-\s(.*)$/;
        const systemIosRegex = /^\[(\d{1,2}[./]\d{1,2}[./]\d{2,4}),\s(\d{1,2}:\d{2}(?::\d{2})?\s?[A-Za-z]{0,2})\]\s(.*)$/;

        lines.forEach((line, index) => {
          const cleanLine = line.trim();
          if (!cleanLine) return;

          let match = cleanLine.match(iosRegex);
          if (match) {
            if (currentMessage) messages.push(currentMessage);
            currentMessage = {
              id: `msg-${index}`,
              date: match[1],
              time: match[2],
              sender: match[3].trim(),
              content: match[4],
              isSystem: false
            };
            return;
          }

          match = cleanLine.match(androidRegex);
          if (match) {
            if (currentMessage) messages.push(currentMessage);
            currentMessage = {
              id: `msg-${index}`,
              date: match[1],
              time: match[2],
              sender: match[3].trim(),
              content: match[4],
              isSystem: false
            };
            return;
          }

          match = cleanLine.match(systemIosRegex) || cleanLine.match(systemAndroidRegex);
          if (match) {
            const potentialContent = match[3];
            const isKnownSystem = SYSTEM_PATTERNS.some(p => p.test(potentialContent)) || !potentialContent.includes(':');
            
            if (isKnownSystem) {
              if (currentMessage) messages.push(currentMessage);
              currentMessage = {
                id: `msg-${index}`,
                date: match[1],
                time: match[2],
                sender: 'System',
                content: potentialContent,
                isSystem: true
              };
              return;
            }
          }

          if (currentMessage && !currentMessage.isSystem) {
            currentMessage.content += '\n' + line;
          } else if (!currentMessage) {
            currentMessage = {
              id: `msg-${index}`,
              date: '',
              time: '',
              sender: 'System',
              content: line,
              isSystem: true
            };
          }
        });

        if (currentMessage) {
          messages.push(currentMessage);
        }

        setParsedMessages(messages);
        calculateStats(messages);
      };

      const calculateStats = (messages) => {
        const userCounts = {};
        const hourlyActivity = Array(24).fill(0);
        const emojiMap = {};
        const wordMap = {};

        const emojiRegex = /[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu;

        messages.forEach(msg => {
          if (msg.isSystem) return;

          userCounts[msg.sender] = (userCounts[msg.sender] || 0) + 1;

          const hourMatch = msg.time.match(/^(\d{1,2})/);
          if (hourMatch) {
            let hour = parseInt(hourMatch[1], 10);
            if (msg.time.toLowerCase().includes('pm') && hour < 12) hour += 12;
            if (msg.time.toLowerCase().includes('am') && hour === 12) hour = 0;
            if (hour >= 0 && hour < 24) {
              hourlyActivity[hour]++;
            }
          }

          const emojis = msg.content.match(emojiRegex);
          if (emojis) {
            emojis.forEach(emoji => {
              emojiMap[emoji] = (emojiMap[emoji] || 0) + 1;
            });
          }

          const cleanWords = msg.content
            .toLowerCase()
            .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, '')
            .split(/\s+/);

          const stopWords = new Set(['the', 'a', 'to', 'and', 'i', 'is', 'you', 'it', 'in', 'of', 'for', 'on', 'that', 'this', 'me', 'my', 'we', 'are', 'was', 'have', 'with', 'at', 'be', 'so', 'just', 'but', 'or', 'an']);

          cleanWords.forEach(word => {
            if (word.length > 2 && !stopWords.has(word) && !word.match(/^\d+$/)) {
              wordMap[word] = (wordMap[word] || 0) + 1;
            }
          });
        });

        const topEmojis = Object.entries(emojiMap)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10);

        const topWords = Object.entries(wordMap)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 12);

        setParsedStats({
          totalMessages: messages.filter(m => !m.isSystem).length,
          userCounts,
          hourlyActivity,
          topEmojis,
          topWords
        });
      };

      // Swap sides quickly
      const handleSwapSides = () => {
        if (participants.length >= 2) {
          const currentIndex = participants.indexOf(selectedUser);
          const nextIndex = (currentIndex + 1) % participants.length;
          setSelectedUser(participants[nextIndex]);
        } else if (participants.length === 1) {
          setSelectedUser(selectedUser ? '' : participants[0]);
        }
      };

      // =========================================================================
      // =========================================================================
      
      const apiKey = ""; // Integrated automatically in deployment environment

      const callGeminiWithRetry = async (payload, systemPrompt, maxRetries = 5) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const requestOptions = {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contents: [{ parts: [{ text: payload }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] }
          })
        };

        let delay = 1000;
        for (let i = 0; i < maxRetries; i++) {
          try {
            const response = await fetch(url, requestOptions);
            if (response.ok) {
              const result = await response.json();
              const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) return text;
              throw new Error("Empty candidate in model response.");
            }
          } catch (err) {
            if (i === maxRetries - 1) throw err;
          }
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2; 
        }
        throw new Error("AI query timeout. Please double check logs or network.");
      };

      const getCleanChatSubset = (maxChars = 24000) => {
        let result = "";
        for (let i = 0; i < parsedMessages.length; i++) {
          const msg = parsedMessages[i];
          if (msg.isSystem) continue;
          const row = `[${msg.date} ${msg.time}] ${msg.sender}: ${msg.content}\n`;
          if (result.length + row.length > maxChars) break;
          result += row;
        }
        return result;
      };

      const handleGenerateSummary = async () => {
        setSummaryLoading(true);
        setSummaryError('');
        setAiSummary('');

        try {
          const chatContext = getCleanChatSubset();
          if (!chatContext) throw new Error("Please import or type conversational logs first.");

          const prompt = `Here is our WhatsApp conversation chat history log:\n\n${chatContext}\n\nAnalyze this conversation and generate a structured, visually engaging brief summary. Include: 1. Main Topics/Themes discussed, 2. Overall mood and tone, 3. Key Decisions reached, and 4. A list of actionable items with owners if applicable.`;
          const systemPrompt = "You are an operations intelligence analyst. Summarize conversion dialogue concisely, highlighting actionable priorities and structural themes using formatting layout.";

          const text = await callGeminiWithRetry(prompt, systemPrompt);
          setAiSummary(text);
        } catch (err) {
          setSummaryError(err.message || "Failed to draft AI summaries.");
        } finally {
          setSummaryLoading(false);
        }
      };

      const handleAskSimulator = async (e) => {
        e.preventDefault();
        if (!simulatorQuestion.trim()) return;

        setSimulatorLoading(true);
        setSimulatorError('');
        setSimulatorAnswer('');

        try {
          const chatContext = getCleanChatSubset();
          if (!chatContext) throw new Error("Please import or type conversational logs first.");

          const prompt = `Chat logs for context:\n${chatContext}\n\nQuestion from user: "${simulatorQuestion}"\n\nSimulate ${simulatorTarget} and respond. Keep it highly relevant to their tone, emoji usage, and facts from the logs!`;
          const systemPrompt = `You are a conversation simulator mimicking the participant "${simulatorTarget}". Read the conversation history to analyze their style, emoji patterns, response length, spelling behaviors, and perspective. Answer questions as if you ARE ${simulatorTarget} speaking back directly. Keep answers conversational, natural, and never reveal you are an AI.`;

          const text = await callGeminiWithRetry(prompt, systemPrompt);
          setSimulatorAnswer(text);
        } catch (err) {
          setSimulatorError(err.message || "Could not generate simulated persona.");

        }

        e.preventDefault();
        if (!semanticQuery.trim()) return;

        setSemanticError('');
        setSemanticAnswer('');

          const chatContext = getCleanChatSubset();
          const prompt = `Analyze this conversation log:\n${chatContext}\n\nSearch and answer the user's natural language inquiry: "${semanticQuery}"\n\nAnswer directly based only on information inside the logs. Quote relevant details or specify times/participants when possible. If the context doesn't contain the answer, politely say so.`;

          const text = await callGeminiWithRetry(prompt, systemPrompt);
          setSemanticAnswer(text);

          setSemanticError(err.message || "Semantic queries failed.");
        } finally {
          setSemanticLoading(false);
        }

                : part

        );
      };

      const renderFormattedMarkdown = (text) => {
        if (!text) return null;
        return text.split('\n').map((line, i) => {
          let processed = line;
          const boldRegex = /\*\*(.*?)\*\*/g;
          const matchBold = [...processed.matchAll(boldRegex)];
          
          if (matchBold.length > 0) {
            const parts = [];
            let lastIndex = 0;
            matchBold.forEach((match, idx) => {
              if (match.index > lastIndex) {
                parts.push(<span key={`text-${idx}`}>{processed.substring(lastIndex, match.index)}</span>);
              }
              parts.push(<strong key={`bold-${idx}`} className="text-emerald-500 font-bold dark:text-emerald-400">{match[1]}</strong>);
              lastIndex = match.index + match[0].length;
            });
            if (lastIndex < processed.length) {
              parts.push(<span key="text-end">{processed.substring(lastIndex)}</span>);
            }
            return <p key={i} className="my-1.5 leading-relaxed">{parts}</p>;
          }

          if (line.trim().startsWith('* ') || line.trim().startsWith('- ')) {
            return (
              <li key={i} className="list-disc ml-5 my-1 text-gray-700 dark:text-gray-300">
                {line.trim().substring(2)}
              </li>
            );
          }
          return <p key={i} className="my-1.5 leading-relaxed">{line}</p>;
        });
      };

                            <div key={emoji} className={`p-2 rounded-lg border flex flex-col justify-center items-center ${
                              darkMode ? 'bg-[#202c33]/40 border-transparent' : 'bg-white border-gray-200'
                            }`}>
                              <span className="text-2xl mb-1">{emoji}</span>
                              <span className="text-[10px] font-semibold text-gray-400">{count}x</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Hourly activity charts */}
                  <div className={`p-4 rounded-xl border ${darkMode ? 'bg-black/10 border-[#222e35]' : 'bg-gray-50 border-gray-200'}`}>
                    <h4 className="text-xs font-semibold text-emerald-500 mb-4 flex items-center space-x-1">
                      <Icons.Clock />
                      <span>Hourly Activity Trend</span>
                    </h4>

                    <div className="flex items-end justify-between h-36 pt-4 px-2 border-b border-gray-700/50">
                      {parsedStats.hourlyActivity.map((count, hour) => {
                        const maxActivity = Math.max(...parsedStats.hourlyActivity);
                        const heightPercent = maxActivity > 0 ? (count / maxActivity) * 100 : 0;
                        return (
                          <div key={hour} className="flex-1 flex flex-col items-center group">
                            <span className="text-[9px] text-emerald-400 opacity-0 group-hover:opacity-100 transition-opacity mb-1">{count}</span>
                            <div 
                              className="w-2 md:w-3 bg-emerald-600 rounded-t-sm group-hover:bg-emerald-400 transition-colors"
                              style={{ height: `${Math.max(heightPercent, 2)}%` }}
                            />
                            <span className="text-[8px] text-gray-400 mt-2 select-none">
                              {hour === 0 ? '12a' : hour === 12 ? '12p' : hour > 12 ? `${hour-12}p` : `${hour}a`}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Pop words clouds */}
                  <div className={`p-4 rounded-xl border ${darkMode ? 'bg-black/10 border-[#222e35]' : 'bg-gray-50 border-gray-200'}`}>
                    <h4 className="text-xs font-semibold text-emerald-500 mb-3 flex items-center space-x-1">
                      <Icons.BarChart />
                      <span>Most Frequently Mentioned Words</span>
                    </h4>

                    <div className="flex flex-wrap gap-2 pt-2">
                      {parsedStats.topWords.length === 0 ? (
                        <div className="w-full text-center py-6 text-xs text-gray-400">
                          Not enough conversation data to build lists.
                        </div>
                      ) : (
                        parsedStats.topWords.map(([word, count]) => (
                          <span 
                            key={word} 
                            className={`text-xs px-3 py-1.5 rounded-full border shadow-sm font-medium ${
                              darkMode 
                                ? 'bg-[#202c33] border-[#2f3b43] text-gray-200' 
                                : 'bg-emerald-50 border-emerald-100 text-emerald-700'
                            }`}
                          >
                            {word} <strong className="opacity-75 text-[10px]">({count})</strong>
                          </span>
                        ))
                      )}
                    </div>
                  </div>

                </div>
              )}

              {/* TAB 3: ✨ GEMINI AI PLAYGROUND */}
              {}
              {activeTab === 'ai' && (
                <div className={`flex-1 overflow-y-auto p-6 rounded-2xl border shadow-sm space-y-6 ${darkMode ? 'bg-[#111b21] border-[#222e35]' : 'bg-white border-gray-200'}`}>
                  
                  <div className="flex items-center space-x-3 pb-4 border-b border-gray-700/30">
                    <div className="p-2.5 rounded-xl bg-gradient-to-tr from-purple-500 to-indigo-600 text-white shadow-md animate-pulse">
                      <Icons.Sparkles />
                    </div>
                    <div>
                      <h3 className="font-bold text-lg flex items-center gap-1.5">
                        Gemini AI Conversational Explorer
                      </h3>
                      <p className="text-xs text-gray-400">Extract summaries, simulate participants, and query logs semantically</p>
                    </div>
                  </div>

                  {/* Summary generation */}
                  <div className={`p-5 rounded-xl border ${darkMode ? 'bg-black/25 border-[#222e35]' : 'bg-gray-50 border-gray-300'}`}>
                    <div className="flex flex-wrap items-center justify-between gap-2 mb-3">
                      <h4 className="text-sm font-bold text-emerald-400 flex items-center space-x-1.5">
                        <Icons.Sparkles />
                        <span>✨ Smart Summary & Action Items</span>
                      </h4>
                      <button
                        onClick={handleGenerateSummary}
                        disabled={summaryLoading}
                        className="text-xs font-semibold bg-emerald-600 hover:bg-emerald-500 disabled:bg-emerald-800 text-white py-1.5 px-3 rounded-lg flex items-center gap-1.5 transition-all shadow-sm"
                      >
                        {summaryLoading ? <Icons.Loader /> : <Icons.Sparkles />}
                        <span>{aiSummary ? 'Regenerate' : 'Generate'}</span>
                      </button>
                    </div>

                    {summaryError && (
                      <div className="mb-4 p-3 bg-red-950/40 border border-red-800/50 rounded-lg text-xs text-red-400 flex items-start gap-2">
                        <Icons.AlertCircle />
                        <span>{summaryError}</span>
                      </div>
                    )}

                    {aiSummary ? (
                      <div className={`p-4 rounded-lg text-xs md:text-sm border leading-relaxed max-h-72 overflow-y-auto space-y-1 ${
                        darkMode ? 'bg-[#202c33]/40 border-[#2f3b43]' : 'bg-white border-gray-200'
                      }`}>
                        {renderFormattedMarkdown(aiSummary)}
                      </div>
                    ) : (
                      !summaryLoading && (
                        <div className="border border-dashed border-gray-700/60 rounded-lg p-6 text-center text-xs text-gray-400">
                          Click Generate to let Gemini analyze the conversations.
                        </div>
                      )
                    )}

                    {summaryLoading && (
                      <div className="flex flex-col items-center justify-center p-8 text-xs text-gray-400 space-y-2">
                        <Icons.Loader />
                        <span className="animate-pulse">Gemini is compiling conversation metrics...</span>
                      </div>
                    )}
                  </div>

                  {/* Senders Persona Simulation */}
                  <div className={`p-5 rounded-xl border ${darkMode ? 'bg-black/25 border-[#222e35]' : 'bg-gray-50 border-gray-300'}`}>
                    <h4 className="text-sm font-bold text-emerald-400 flex items-center space-x-1.5 mb-2">
                      <Icons.User />
                      <span>✨ Ask Simulated Persona Bot</span>
                    </h4>

                    <form onSubmit={handleAskSimulator} className="space-y-3">
                      <div className="flex flex-col sm:flex-row gap-2">
                        <div className="sm:w-1/3">
                          <label className="text-[10px] uppercase font-bold tracking-wider text-gray-400 block mb-1">Simulate:</label>
                          <select
                            value={simulatorTarget}
                            onChange={(e) => setSimulatorTarget(e.target.value)}
                            className={`w-full p-2.5 rounded-lg text-xs border outline-none ${
                              darkMode ? 'bg-[#202c33] border-[#2f3b43] text-white' : 'bg-white border-gray-300'
                            }`}
                          >
                            {participants.map(user => (
                              <option key={user} value={user}>{user}</option>
                            ))}
                          </select>
                        </div>
                        <div className="flex-1">
                          <label className="text-[10px] uppercase font-bold tracking-wider text-gray-400 block mb-1">Query:</label>
                          <div className="flex gap-2">
                            <input
                              type="text"
                              placeholder={`Ask ${simulatorTarget || 'them'} anything...`}
                              value={simulatorQuestion}
                              onChange={(e) => setSimulatorQuestion(e.target.value)}
                              className={`flex-1 px-3 py-2.5 rounded-lg text-xs border focus:ring-1 focus:ring-emerald-500 outline-none ${
                                darkMode ? 'bg-[#202c33] border-[#2f3b43] text-white' : 'bg-white border-gray-300'
                              }`}
                            />
                            <button
                              type="submit"
                              disabled={simulatorLoading || !simulatorQuestion.trim()}
                              className="bg-emerald-600 hover:bg-emerald-500 disabled:bg-emerald-800 text-white font-semibold text-xs px-4 py-2.5 rounded-lg flex items-center gap-1 shrink-0 transition-all shadow-sm"
                            >
                              {simulatorLoading ? <Icons.Loader /> : <Icons.Sparkles />}
                              <span>Ask</span>
                            </button>
                          </div>
                        </div>
                      </div>
                    </form>

                    {simulatorError && (
                      <div className="mt-4 p-3 bg-red-950/40 border border-red-800/50 rounded-lg text-xs text-red-400 flex items-start gap-2">
                        <Icons.AlertCircle />
                        <span>{simulatorError}</span>
                      </div>
                    )}

                    {simulatorAnswer && (
                      <div className="mt-4 space-y-2">
                        <div className="flex items-center gap-2">
                          <div className="w-6 h-6 rounded-full bg-emerald-700 text-white font-bold text-[10px] flex items-center justify-center">
                            {simulatorTarget.substring(0, 2).toUpperCase()}
                          </div>
                          <span className="text-xs font-bold text-gray-300">{simulatorTarget} Sim-Bot response:</span>
                        </div>
                        <div className={`p-4 rounded-lg text-xs md:text-sm border italic leading-relaxed ${
                          darkMode ? 'bg-[#202c33]/40 border-[#2f3b43]' : 'bg-white border-gray-200'
                        }`}>
                          {renderFormattedMarkdown(simulatorAnswer)}
                        </div>
                      </div>
                    )}

                    {simulatorLoading && (
                      <div className="flex flex-col items-center justify-center p-6 text-xs text-gray-400 space-y-2">
                        <Icons.Loader />
                        <span>Replicating conversation speaking styles...</span>
                      </div>
                    )}
                  </div>

                  {/* Semantic search explorer */}
                  <div className={`p-5 rounded-xl border ${darkMode ? 'bg-black/25 border-[#222e35]' : 'bg-gray-50 border-gray-300'}`}>
                    <h4 className="text-sm font-bold text-emerald-400 flex items-center space-x-1.5 mb-2">
                      <Icons.HelpCircle />
                      <span>✨ Semantic Conversation Finder</span>
                    </h4>

                    <form onSubmit={handleSemanticSearch} className="flex gap-2">
                      <input
                        type="text"
                        placeholder="e.g. 'What are they planning to bring to the meeting?'"
                        value={semanticQuery}
                        onChange={(e) => setSemanticQuery(e.target.value)}
                        className={`flex-1 px-3 py-2.5 rounded-lg text-xs border focus:ring-1 focus:ring-emerald-500 outline-none ${
                          darkMode ? 'bg-[#202c33] border-[#2f3b43] text-white' : 'bg-white border-gray-300'
                        }`}
                      />
                      <button
                        type="submit"
                        disabled={semanticLoading || !semanticQuery.trim()}
                        className="bg-emerald-600 hover:bg-emerald-500 disabled:bg-emerald-800 text-white font-semibold text-xs px-4 py-2.5 rounded-lg flex items-center gap-1 shrink-0 transition-all shadow-sm"
                      >
                        {semanticLoading ? <Icons.Loader /> : <Icons.Search />}
                        <span>Search</span>
                      </button>
                    </form>

                    {semanticError && (
                      <div className="mt-4 p-3 bg-red-950/40 border border-red-800/50 rounded-lg text-xs text-red-400 flex items-start gap-2">
                        <Icons.AlertCircle />
                        <span>{semanticError}</span>
                      </div>
                    )}

                    {semanticAnswer && (
                      <div className="mt-4 space-y-1">
                        <span className="text-[10px] uppercase font-bold tracking-wider text-emerald-500 block">AI Findings Answer:</span>
                        <div className={`p-4 rounded-lg text-xs md:text-sm border leading-relaxed ${
                          darkMode ? 'bg-[#202c33]/40 border-[#2f3b43]' : 'bg-white border-gray-200'
                        }`}>
                          {renderFormattedMarkdown(semanticAnswer)}
                        </div>
                      </div>
                    )}

                    {semanticLoading && (
                      <div className="flex flex-col items-center justify-center p-6 text-xs text-gray-400 space-y-2">
                        <Icons.Loader />
                        <span>Searching logs semantically...</span>
                      </div>
                    )}
                  </div>

                </div>
              )}

            </section>

          </main>

          {/* FOOTER */}
          <footer className={`mt-auto py-4 text-center text-xs border-t ${darkMode ? 'bg-[#111b21] border-[#222e35] text-gray-500' : 'bg-white border-gray-200 text-gray-400'}`}>
            <p>© 2026 WhatsApp Chat Log Beautifier • Compiled natively inside your browser</p>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
